<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人管理系统</title>
<style>
:root{
  --bg:#f4f5f9; --surface:#ffffff; --sidebar:#fbfbfe; --border:#e8eaf2;
  --text:#1c2333; --muted:#7a8194; --faint:#a8aec0;
  --accent:#5468ff; --accent-soft:#eef0ff; --accent-hover:#4456e6;
  --green:#22b07d; --green-soft:#e6f7f0; --orange:#f5a623; --orange-soft:#fdf3e2;
  --red:#ef4d63; --red-soft:#fdecef; --shadow:0 1px 3px rgba(28,35,51,.06),0 1px 2px rgba(28,35,51,.04);
  --shadow-lg:0 8px 28px rgba(28,35,51,.12);
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,"Segoe UI","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#d4d8e6;border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:248px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* sidebar */
.brand{padding:22px 22px 18px;display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#8a5cff);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;letter-spacing:.2px}
.brand-sub{font-size:11px;color:var(--faint);font-weight:500}
.nav{flex:1;padding:8px 12px;overflow-y:auto}
.nav-label{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);color:var(--muted);font-weight:500;font-size:13.5px;width:100%;text-align:left;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--accent-soft);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item.active .nav-count{background:rgba(255,255,255,.25);color:#fff}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-count{margin-left:auto;background:var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.side-btn{flex:1;padding:8px;border-radius:var(--radius-sm);font-size:12px;color:var(--muted);font-weight:500;border:1px solid var(--border);background:var(--surface);transition:all .15s}
.side-btn:hover{border-color:var(--accent);color:var(--accent)}

/* topbar */
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700}
.search-box{margin-left:auto;position:relative;width:300px}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.search-box input:focus{border-color:var(--accent);background:var(--surface)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint)}
.btn-primary{background:var(--accent);color:#fff;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--muted);border:1px solid var(--border);background:var(--surface)}
.btn-ghost:hover{color:var(--accent);border-color:var(--accent)}

/* content */
.content{flex:1;overflow-y:auto;padding:24px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:20px;font-weight:700}
.page-head p{color:var(--muted);font-size:13px;margin-top:2px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.chip{padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-num{font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:12.5px;color:var(--muted);margin-top:4px}
.dash-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.dash-section h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.recent-list{display:flex;flex-direction:column;gap:10px}
.recent-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s}
.recent-item:hover{background:var(--bg)}
.recent-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;flex-shrink:0}
.recent-title{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-date{font-size:11px;color:var(--faint);flex-shrink:0}
.empty-hint{text-align:center;padding:40px 20px;color:var(--faint)}
.empty-hint .big{font-size:40px;margin-bottom:10px}

/* list cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:pointer;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.card-title{font-size:15px;font-weight:600;line-height:1.4}
.card-body{color:var(--muted);font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.card-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px}
.badge-green{background:var(--green-soft);color:var(--green)}
.badge-orange{background:var(--orange-soft);color:var(--orange)}
.badge-red{background:var(--red-soft);color:var(--red)}
.badge-blue{background:var(--accent-soft);color:var(--accent)}
.badge-gray{background:#eef0f4;color:var(--muted)}
.tag{font-size:11px;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:6px}
.card-meta{font-size:11px;color:var(--faint);margin-left:auto}
.stars{color:var(--orange);font-size:13px;letter-spacing:1px}
.progress-bar{height:6px;background:var(--bg);border-radius:6px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .3s}
.card-del{position:absolute;top:12px;right:12px;opacity:0;color:var(--faint);font-size:16px;padding:2px 6px;border-radius:6px;transition:opacity .15s,background .15s}
.card:hover .card-del{opacity:1}
.card-del:hover{background:var(--red-soft);color:var(--red)}

/* modal */
.modal-mask{position:fixed;inset:0;background:rgba(28,35,51,.4);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border-radius:16px;width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{font-size:22px;color:var(--faint);width:30px;height:30px;border-radius:8px}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:22px 24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:var(--surface)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rating{display:flex;gap:4px;font-size:22px;cursor:pointer}
.rating span{color:var(--border);transition:color .1s}
.rating span.on{color:var(--orange)}
.rating span:hover{color:var(--orange)}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface)}

/* detail */
.detail-view{max-width:760px;margin:0 auto}
.detail-back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:500;margin-bottom:16px;cursor:pointer}
.detail-back:hover{color:var(--accent)}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.detail-title{font-size:22px;font-weight:700;margin-bottom:6px}
.detail-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.detail-section{margin-bottom:20px}
.detail-section h4{font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.detail-section p{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap}
.detail-meta{display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--muted);padding-top:16px;border-top:1px solid var(--border)}
.detail-actions{display:flex;gap:10px;margin-top:18px}

/* search results */
.search-panel{max-width:760px;margin:0 auto}
.search-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;transition:box-shadow .15s}
.search-result:hover{box-shadow:var(--shadow-lg)}

@media(max-width:760px){
  .sidebar{width:64px}.brand-name,.brand-sub,.nav-item span:not(.nav-icon),.nav-count,.nav-label{display:none}
  .search-box{width:160px}
}
</style>
</head>
<body>
<div class="app">
  <!-- sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">◆</div>
      <div><div class="brand-name">个人管理</div><div class="brand-sub">My Life OS</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <button class="side-btn" onclick="exportData()">导出</button>
      <button class="side-btn" onclick="document.getElementById('importFile').click()">导入</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    </div>
  </aside>
  <!-- main -->
  <div class="main">
    <header class="topbar">
      <h1 id="pageTitle">仪表盘</h1>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="搜索全部内容…" oninput="onSearch(this.value)">
      </div>
      <button class="btn-primary" id="addBtn" onclick="openAdd()">+ 新建</button>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>
<!-- modal -->
<div class="modal-mask" id="modalMask" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
/* ============ 数据层 ============ */
const PREFIX='pms_';
const TYPES={
  problems:{label:'问题',icon:'❗',color:'red',fields:[
    {key:'title',label:'问题标题',type:'text',req:true},
    {key:'description',label:'问题描述',type:'textarea'},
    {key:'status',label:'状态',type:'select',options:['待解决','解决中','已解决'],default:'待解决'},
    {key:'priority',label:'优先级',type:'select',options:['高','中','低'],default:'中'},
    {key:'solution',label:'解决方案',type:'textarea'},
    {key:'tags',label:'标签（逗号分隔）',type:'tags'}
  ]},
  reflections:{label:'反思',icon:'💭',color:'blue',fields:[
    {key:'title',label:'反思主题',type:'text',req:true},
    {key:'content',label:'反思内容',type:'textarea',req:true},
    {key:'mood',label:'心情',type:'select',options:['😊 开心','😌 平静','😐 一般','😔 低落','😣 痛苦'],default:'😌 平静'},
    {key:'tags',label:'标签（逗号分隔）',type:'tags'}
  ]},
  plans:{label:'计划',icon:'🎯',color:'orange',fields:[
    {key:'title',label:'计划标题',type:'text',req:true},
    {key:'description',label:'计划描述',type:'textarea'},
    {key:'status',label:'状态',type:'select',options:['待开始','进行中','已完成'],default:'待开始'},
    {key:'priority',label:'优先级',type:'select',options:['高','中','低'],default:'中'},
    {key:'progress',label:'进度',type:'range',default:0},
    {key:'dueDate',label:'截止日期',type:'date'},
    {key:'tags',label:'标签（逗号分隔）',type:'tags'}
  ]},
  books:{label:'书籍',icon:'📚',color:'green',fields:[
    {key:'title',label:'书名',type:'text',req:true},
    {key:'author',label:'作者',type:'text'},
    {key:'status',label:'状态',type:'select',options:['想读','在读','已读'],default:'想读'},
    {key:'rating',label:'评分',type:'rating',default:0},
    {key:'finishDate',label:'读完日期',type:'date'},
    {key:'notes',label:'读书笔记',type:'textarea'},
    {key:'tags',label:'标签（逗号分隔）',type:'tags'}
  ]},
  videos:{label:'视频',icon:'🎬',color:'orange',fields:[
    {key:'title',label:'视频标题',type:'text',req:true},
    {key:'source',label:'来源/频道',type:'text'},
    {key:'status',label:'状态',type:'select',options:['想看','已看'],default:'想看'},
    {key:'rating',label:'评分',type:'rating',default:0},
    {key:'url',label:'链接',type:'text'},
    {key:'watchDate',label:'观看日期',type:'date'},
    {key:'notes',label:'观看笔记',type:'textarea'},
    {key:'tags',label:'标签（逗号分隔）',type:'tags'}
  ]}
};
const DB={
  get(t){try{return JSON.parse(localStorage.getItem(PREFIX+t)||'[]')}catch(e){return[]}},
  set(t,v){localStorage.setItem(PREFIX+t,JSON.stringify(v))},
  add(t,item){const a=DB.get(t);item.id=uid();item.createdAt=Date.now();item.updatedAt=Date.now();a.unshift(item);DB.set(t,a);return item},
  update(t,id,patch){const a=DB.get(t);const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...patch,updatedAt:Date.now()};DB.set(t,a);return a[i]}},
  remove(t,id){DB.set(t,DB.get(t).filter(x=>x.id!==id))}
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=ts=>{if(!ts)return'';const d=new Date(ts);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fmtRel=ts=>{if(!ts)return'';const d=Date.now()-ts;if(d<6e4)return'刚刚';if(d<36e5)return Math.floor(d/6e4)+'分钟前';if(d<864e5)return Math.floor(d/36e5)+'小时前';if(d<6048e5)return Math.floor(d/864e5)+'天前';return fmtDate(ts)};

/* ============ 状态 ============ */
let currentView='dashboard';
let currentFilter='all';
let searchQuery='';

/* ============ 导航 ============ */
const NAV=[
  {key:'dashboard',label:'仪表盘',icon:'🏠'},
  ...Object.entries(TYPES).map(([k,v])=>({key:k,label:v.label,icon:v.icon}))
];
function renderNav(){
  const counts={};
  Object.keys(TYPES).forEach(t=>counts[t]=DB.get(t).length);
  document.getElementById('nav').innerHTML=`
    <div class="nav-label">总览</div>
    ${NAV.map(n=>`<button class="nav-item ${currentView===n.key?'active':''}" onclick="navigate('${n.key}')">
      <span class="nav-icon">${n.icon}</span>
      <span>${n.label}</span>
      ${n.key!=='dashboard'?`<span class="nav-count">${counts[n.key]||0}</span>`:''}
    </button>`).join('')}
  `;
}
function navigate(view){currentView=view;currentFilter='all';searchQuery='';document.getElementById('searchInput').value='';renderNav();render();}

/* ============ 渲染 ============ */
function render(){
  const titles={dashboard:'仪表盘',...Object.fromEntries(Object.entries(TYPES).map(([k,v])=>[k,v.label]))};
  document.getElementById('pageTitle').textContent=searchQuery?'搜索结果':titles[currentView];
  document.getElementById('addBtn').style.display=(currentView!=='dashboard'&&!searchQuery)?'inline-flex':'none';
  const c=document.getElementById('content');
  if(searchQuery){c.innerHTML=renderSearch();return}
  if(currentView==='dashboard'){c.innerHTML=renderDashboard();return}
  c.innerHTML=renderList(currentView);
}

/* 仪表盘 */
function renderDashboard(){
  const items=Object.entries(TYPES).map(([k,v])=>({key:k,...v,count:DB.get(k).length}));
  const colors={red:'var(--red-soft)',blue:'var(--accent-soft)',orange:'var(--orange-soft)',green:'var(--green-soft)'};
  const all=[];
  Object.keys(TYPES).forEach(t=>DB.get(t).forEach(it=>all.push({...it,_type:t})));
  all.sort((a,b)=>(b.updatedAt||b.createdAt)-(a.updatedAt||a.createdAt));
  const recent=all.slice(0,8);
  const tags={};
  all.forEach(it=>(it.tags||[]).forEach(t=>tags[t]=(tags[t]||0)+1));
  const topTags=Object.entries(tags).sort((a,b)=>b[1]-a[1]).slice(0,8);
  return `
    <div class="dash-grid">
      ${items.map(i=>`<div class="stat-card" onclick="navigate('${i.key}')">
        <div class="stat-icon" style="background:${colors[i.color]}">${i.icon}</div>
        <div class="stat-num">${i.count}</div>
        <div class="stat-label">${i.label}</div>
      </div>`).join('')}
    </div>
    <div class="dash-grid" style="grid-template-columns:2fr 1fr">
      <div class="dash-section">
        <h3>🕐 最近更新</h3>
        ${recent.length?`<div class="recent-list">${recent.map(r=>`<div class="recent-item" onclick="navigate('${r._type}')">
          <span class="recent-tag badge-${TYPES[r._type].color==='blue'?'blue':TYPES[r._type].color}">${TYPES[r._type].icon} ${TYPES[r._type].label}</span>
          <span class="recent-title">${esc(r.title)}</span>
          <span class="recent-date">${fmtRel(r.updatedAt||r.createdAt)}</span>
        </div>`).join('')}</div>`:'<div class="empty-hint"><div class="big">📭</div>还没有内容，点击右上角"新建"开始记录吧</div>'}
      </div>
      <div class="dash-section">
        <h3>🏷️ 热门标签</h3>
        ${topTags.length?`<div style="display:flex;flex-wrap:wrap;gap:8px">${topTags.map(([t,n])=>`<span class="tag" style="cursor:pointer" onclick="globalTagSearch('${esc(t)}')">${esc(t)} <b>${n}</b></span>`).join('')}</div>`:'<div class="empty-hint" style="padding:20px">暂无标签</div>'}
      </div>
    </div>`;
}

/* 列表 */
function renderList(type){
  let items=DB.get(type);
  const def=TYPES[type];
  // 筛选项
  let filterOpts=['all'];
  const statusField=def.fields.find(f=>f.key==='status');
  if(statusField)filterOpts=filterOpts.concat(statusField.options);
  if(currentFilter!=='all')items=items.filter(it=>it.status===currentFilter);
  const colorMap={red:'red',blue:'blue',orange:'orange',green:'green',gray:'gray'};
  return `
    <div class="page-head">
      <div><h2>${def.icon} ${def.label}</h2><p>共 ${items.length} 条记录</p></div>
    </div>
    ${statusField?`<div class="filter-row">${filterOpts.map(f=>`<button class="chip ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${f==='all'?'全部':f}</button>`).join('')}</div>`:''}
    ${items.length?`<div class="card-grid">${items.map(it=>renderCard(type,it)).join('')}</div>`:`<div class="empty-hint"><div class="big">${def.icon}</div>还没有${def.label}记录<br><button class="btn-primary" style="margin-top:14px" onclick="openAdd('${type}')">+ 添加${def.label}</button></div>`}
  `;
}
function setFilter(f){currentFilter=f;render();}
function renderCard(type,it){
  const def=TYPES[type];
  const badgeCls={red:'badge-red',blue:'badge-blue',orange:'badge-orange',green:'badge-green',gray:'badge-gray'};
  let body='';
  if(it.description)body=it.description;
  else if(it.content)body=it.content;
  else if(it.notes)body=it.notes;
  else if(it.solution)body=it.solution;
  let extra='';
  if(type==='plans'&&typeof it.progress==='number'){
    extra=`<div class="progress-bar"><div class="progress-fill" style="width:${it.progress}%"></div></div><span style="font-size:11px;color:var(--muted)">${it.progress}%</span>`;
  }
  if((type==='books'||type==='videos')&&it.rating>0){
    extra+=`<span class="stars">${'★'.repeat(it.rating)}${'☆'.repeat(5-it.rating)}</span>`;
  }
  const tags=(it.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  return `<div class="card" onclick="openDetail('${type}','${it.id}')">
    <div class="card-del" onclick="event.stopPropagation();delItem('${type}','${it.id}')">✕</div>
    <div class="card-top"><div class="card-title">${esc(it.title)}</div></div>
    ${body?`<div class="card-body">${esc(body)}</div>`:''}
    ${extra?`<div style="margin-bottom:10px">${extra}</div>`:''}
    <div class="card-foot">
      ${it.status?`<span class="badge ${badgeCls[statusColor(type,it.status)]||'badge-gray'}">${it.status}</span>`:''}
      ${it.priority?`<span class="badge badge-gray">${it.priority}</span>`:''}
      ${it.author?`<span class="badge badge-gray">${esc(it.author)}</span>`:''}
      ${it.source?`<span class="badge badge-gray">${esc(it.source)}</span>`:''}
      ${tags}
      <span class="card-meta">${fmtRel(it.updatedAt||it.createdAt)}</span>
    </div>
  </div>`;
}
function statusColor(type,status){
  if(status==='已解决'||status==='已完成'||status==='已读'||status==='已看')return'green';
  if(status==='待解决'||status==='待开始'||status==='想读'||status==='想看')return'gray';
  return'orange';
}

/* 详情 */
function openDetail(type,id){
  const it=DB.get(type).find(x=>x.id===id);
  if(!it)return;
  const def=TYPES[type];
  let html=`<div class="detail-view"><span class="detail-back" onclick="render()">← 返回</span>
    <div class="detail-card">
      <div class="detail-title">${esc(it.title)}</div>
      <div class="detail-badges">
        ${it.status?`<span class="badge ${statusColor(type,it.status)==='green'?'badge-green':statusColor(type,it.status)==='orange'?'badge-orange':'badge-gray'}">${it.status}</span>`:''}
        ${it.priority?`<span class="badge badge-gray">优先级 ${it.priority}</span>`:''}
        ${it.mood?`<span class="badge badge-blue">${it.mood}</span>`:''}
      </div>`;
  def.fields.forEach(f=>{
    if(['title','status','priority','tags','rating','mood'].includes(f.key))return;
    const val=it[f.key];
    if(!val)return;
    let label=f.label;
    if(f.key==='progress')label='进度';
    html+=`<div class="detail-section"><h4>${label}</h4>`;
    if(f.key==='progress')html+=`<div class="progress-bar" style="max-width:300px"><div class="progress-fill" style="width:${val}%"></div></div><p>${val}%</p>`;
    else if(f.key==='rating')html+=`<p class="stars" style="font-size:18px">${'★'.repeat(val)}${'☆'.repeat(5-val)}</p>`;
    else if(f.type==='date')html+=`<p>${fmtDate(val)}</p>`;
    else if(f.key==='url')html+=`<p><a href="${esc(val)}" target="_blank" style="color:var(--accent)">${esc(val)}</a></p>`;
    else html+=`<p>${esc(val)}</p>`;
    html+=`</div>`;
  });
  if(it.tags&&it.tags.length)html+=`<div class="detail-section"><h4>标签</h4><div style="display:flex;gap:6px;flex-wrap:wrap">${it.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`;
  html+=`<div class="detail-meta"><span>创建于 ${fmtDate(it.createdAt)}</span><span>更新于 ${fmtRel(it.updatedAt)}</span></div>`;
  html+=`<div class="detail-actions"><button class="btn-primary" onclick="openEdit('${type}','${id}')">✏️ 编辑</button><button class="btn-ghost" onclick="delItem('${type}','${id}',true)">🗑 删除</button></div>`;
  html+=`</div></div>`;
  document.getElementById('content').innerHTML=html;
  document.getElementById('pageTitle').textContent=def.label+' › 详情';
}

/* 删除 */
function delItem(type,id,fromDetail){
  const it=DB.get(type).find(x=>x.id===id);
  if(!it)return;
  if(!confirm(`确定删除「${it.title}」吗？此操作不可撤销。`))return;
  DB.remove(type,id);
  renderNav();render();
}

/* 弹窗 - 新建/编辑 */
let editCtx=null;
function openAdd(type){
  type=type||currentView;
  if(type==='dashboard')return;
  editCtx={type,mode:'add'};
  renderModal();
}
function openEdit(type,id){
  editCtx={type,mode:'edit',id};
  renderModal();
}
function renderModal(){
  const {type,mode,id}=editCtx;
  const def=TYPES[type];
  const item=mode==='edit'?DB.get(type).find(x=>x.id===id):{};
  const fieldsHtml=def.fields.map(f=>{
    const val=item[f.key]!==undefined?item[f.key]:(f.default!==undefined?f.default:'');
    if(f.type==='textarea')return`<div class="field"><label>${f.label}${f.req?' *':''}</label><textarea id="f_${f.key}" ${f.req?'required':''}>${esc(val)}</textarea></div>`;
    if(f.type==='select')return`<div class="field"><label>${f.label}</label><select id="f_${f.key}">${f.options.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
    if(f.type==='date')return`<div class="field"><label>${f.label}</label><input type="date" id="f_${f.key}" value="${val||''}"></div>`;
    if(f.type==='range')return`<div class="field"><label>${f.label}: <span id="progVal">${val}</span>%</label><input type="range" id="f_${f.key}" min="0" max="100" value="${val}" oninput="document.getElementById('progVal').textContent=this.value" style="padding:0"></div>`;
    if(f.type==='rating')return`<div class="field"><label>${f.label}</label><div class="rating" id="f_${f.key}">${[1,2,3,4,5].map(n=>`<span class="${n<=val?'on':''}" onclick="setRating('${f.key}',${n})">★</span>`).join('')}</div></div>`;
    if(f.type==='tags')return`<div class="field"><label>${f.label}</label><input type="text" id="f_${f.key}" value="${esc((val||[]).join(', '))}" placeholder="如：学习, 技术, 自我提升"></div>`;
    return`<div class="field"><label>${f.label}${f.req?' *':''}</label><input type="text" id="f_${f.key}" value="${esc(val)}" ${f.req?'required':''}></div>`;
  }).join('');
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>${def.icon} ${mode==='add'?'新建':'编辑'}${def.label}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body"><input type="hidden" id="_rating_${def.fields.find(f=>f.type==='rating')?.key||''}">${fieldsHtml}</div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal()">取消</button><button class="btn-primary" onclick="saveItem()">保存</button></div>
  `;
  document.getElementById('modalMask').classList.add('show');
  // 记录 rating 当前值
  const rf=def.fields.find(f=>f.type==='rating');
  if(rf)document.getElementById('_rating_'+rf.key)?.setAttribute('data-val',item[rf.key]||0);
}
function setRating(key,n){
  const box=document.getElementById('f_'+key);
  box.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('on',i<n));
  const hidden=document.getElementById('_rating_'+key);
  if(hidden)hidden.setAttribute('data-val',n);
  else box.setAttribute('data-val',n);
}
function closeModal(){document.getElementById('modalMask').classList.remove('show');editCtx=null;}
function saveItem(){
  const {type,mode,id}=editCtx;
  const def=TYPES[type];
  const data={};
  for(const f of def.fields){
    const el=document.getElementById('f_'+f.key);
    if(!el)continue;
    if(f.type==='tags')data[f.key]=(el.value.split(/[,，、]/).map(s=>s.trim()).filter(Boolean));
    else if(f.type==='rating'){
      const h=document.getElementById('_rating_'+f.key);
      data[f.key]=h?parseInt(h.getAttribute('data-val')||0):(el.getAttribute('data-val')||0);
    }
    else if(f.type==='range')data[f.key]=parseInt(el.value)||0;
    else data[f.key]=el.value.trim();
    if(f.req&&!data[f.key]){el.focus();return}
  }
  if(mode==='add'){DB.add(type,data)}
  else{DB.update(type,id,data)}
  closeModal();renderNav();render();
}

/* 搜索 */
function onSearch(v){searchQuery=v.trim();render();}
function renderSearch(){
  const q=searchQuery.toLowerCase();
  const results=[];
  Object.keys(TYPES).forEach(t=>{
    DB.get(t).forEach(it=>{
      const blob=[it.title,it.description,it.content,it.notes,it.solution,it.author,it.source,(it.tags||[]).join(' ')].join(' ').toLowerCase();
      if(blob.includes(q))results.push({...it,_type:t});
    });
  });
  results.sort((a,b)=>(b.updatedAt||b.createdAt)-(a.updatedAt||a.createdAt));
  if(!q)return'<div class="empty-hint"><div class="big">🔍</div>输入关键词开始搜索</div>';
  return`<div class="search-panel"><p style="color:var(--muted);margin-bottom:16px">找到 ${results.length} 条与「${esc(searchQuery)}」相关的内容</p>
  ${results.length?results.map(r=>`<div class="search-result" onclick="openDetail('${r._type}','${r.id}')">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span class="badge badge-${TYPES[r._type].color==='blue'?'blue':TYPES[r._type].color}">${TYPES[r._type].icon} ${TYPES[r._type].label}</span>
      <span style="font-size:12px;color:var(--faint)">${fmtRel(r.updatedAt||r.createdAt)}</span>
    </div>
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">${esc(r.title)}</div>
    <div style="font-size:12.5px;color:var(--muted)">${esc((r.description||r.content||r.notes||r.solution||'').slice(0,100))}</div>
  </div>`).join(''):'<div class="empty-hint"><div class="big">🔍</div>没有找到相关内容</div>'}
  </div>`;
}
function globalTagSearch(tag){document.getElementById('searchInput').value=tag;onSearch(tag);}

/* 导入导出 */
function exportData(){
  const data={};Object.keys(TYPES).forEach(t=>data[t]=DB.get(t));
  data._exportedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`个人管理备份_${fmtDate(Date.now())}.json`;
  a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!confirm('导入将覆盖当前所有数据，确定继续吗？'))return;
      Object.keys(TYPES).forEach(t=>{if(data[t])DB.set(t,data[t])});
      renderNav();render();
      alert('导入成功！');
    }catch(err){alert('导入失败：文件格式不正确')}
  };
  r.readAsText(file);e.target.value='';
}

/* 启动 */
renderNav();render();
</script>
