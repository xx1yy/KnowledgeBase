<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人知识库</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">🧠</div>
    <div><div class="brand-text">个人知识库</div><div class="brand-sub">My Knowledge OS</div></div>
  </div>
  <nav class="nav" id="nav"></nav>
  <button class="sidebar-toggle" id="sidebarToggle" data-action="toggleSidebar" data-args='[]' title="收起/展开侧栏">
    <span class="st-ico">«</span><span class="st-txt">收起侧栏</span>
  </button>
</aside>
<div class="main">
  <header class="topbar">
    <h1 id="pageTitle">仪表盘</h1>
    <span id="apiStatus" style="font-size:12px;margin-left:8px"></span>
    <button class="btn-g" id="rightbarReveal" data-action="toggleRightbar" data-args='[]' title="显示右侧栏">☰ 侧栏</button>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchBox" placeholder="搜索全部内容…">
    </div>
    <div class="domain-filter" id="domainFilter">
      <button type="button" id="domainFilterBtn" class="btn-g sm" title="按领域过滤全部内容">🗂️ <span id="domainFilterLabel">全部领域</span> <span class="caret">▾</span></button>
      <div class="domain-pop" id="domainFilterPop">
        <label class="domain-opt domain-all"><input type="checkbox" id="dfAll" checked> 全部领域</label>
        <div id="domainFilterList" class="domain-list"></div>
      </div>
    </div>
    <button class="btn-p" id="addBtn" data-action="openQuickCapture" data-args='[]' style="display:none">+ 快速记录</button>
  </header>
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="content" id="content"></div>
    <aside class="rightbar" id="rightbar">
      <div class="rightbar-head">
        <button class="rightbar-toggle" data-action="toggleRightbar" data-args='[]' title="收起右侧栏">▸</button>
      </div>
      <div class="rightbar-body" id="rightbarBody"></div>
    </aside>
  </div>
</div>
</div>
<div class="modal-mask" id="modalMask" data-action="closeModalOnMask" data-args='[]'>
  <div class="modal" id="modal"></div>
</div>

<!-- Core: 基础设施（按依赖顺序） -->
<script src="js/core/api.js"></script>
<script src="js/core/types.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/markdown.js"></script>
<script src="js/core/router.js"></script>
<script src="js/core/domain-filter.js"></script>
<!-- Notes: 笔记/概念/图片 -->
<!-- 共享状态（最先加载，供 concept-detail/list/chapters/editor/extract 引用，避免 TDZ） -->
<script src="js/notes/state.js"></script>
<script src="js/notes/concept-detail.js"></script>
<script src="js/core/modals.js"></script>
<script src="js/notes/extract-concept.js"></script>
<script src="js/notes/image-upload.js"></script>
<!-- Views: 各页面视图 -->
<script src="js/views/dashboard.js"></script>
<!-- Notes: 笔记列表/内容(list) · 章节与拖拽(chapters) · 在线编辑(editor) —— list 须最先加载（持有共享状态） -->
<script src="js/notes/list.js"></script>
<script src="js/notes/chapters.js"></script>
<script src="js/notes/editor.js"></script>
<script src="js/views/graph.js"></script>
<script src="js/views/tags.js"></script>
<script src="js/views/domains.js"></script>
<!-- Layout & Views: 从 app.js 拆分出的独立职责模块（须在 app.js / actions.js 之前加载） -->
<script src="js/layout/sidebar.js"></script>
<script src="js/layout/rightbar.js"></script>
<script src="js/layout/resizer.js"></script>
<script src="js/views/detail.js"></script>
<script src="js/views/search.js"></script>
<script src="js/core/event-delegation.js"></script>
<!-- App: 入口（仅启动初始化 init） -->
<script src="js/app.js"></script>
<!-- Actions: 显式动作注册表 + 分发器（必须最后加载，供 app.js / router.js 解耦调用） -->
<script src="js/core/actions.js"></script>
</body>
</html>
