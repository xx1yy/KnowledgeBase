<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人知识库</title>
<style>
:root{
  --bg:#f4f5f9;--surface:#fff;--sidebar:#fafbfe;--border:#e8eaf2;
  --text:#1a1d2e;--muted:#7a8194;--faint:#a9aec2;
  --accent:#5468ff;--asoft:#eef0ff;--ahover:#4456e6;
  --green:#22b07d;--gsoft:#e6f7f0;--orange:#f5a623;--osoft:#fdf3e2;
  --red:#ef4d63;--rsoft:#fdecef;
  --shadow:0 1px 3px rgba(26,29,46,.06),0 1px 2px rgba(26,29,46,.04);
  --shadow-lg:0 8px 28px rgba(26,29,46,.12);
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,"Segoe UI","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#d4d8e6;border-radius:8px}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:232px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7c5ce7);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.brand-text{font-size:14px;font-weight:700;letter-spacing:.1px}
.brand-sub{font-size:10.5px;color:var(--faint);font-weight:500}
.nav{padding:8px 12px;flex:1;overflow-y:auto}
.nav-label{font-size:10.5px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);color:var(--muted);font-weight:500;font-size:13px;width:100%;text-align:left;transition:all .12s;margin-bottom:1px}
.nav-item:hover{background:var(--asoft);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item.active .nav-n{background:rgba(255,255,255,.25);color:#fff}
.nav-i{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-n{margin-left:auto;background:var(--border);color:var(--muted);font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:20px;min-width:20px;text-align:center}

.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:16px;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700}
.search{position:relative;margin-left:auto;width:280px}
.search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border .12s}
.search input:focus{border-color:var(--accent);background:var(--surface)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}

.content{flex:1;overflow-y:auto;padding:22px}

.btn-p{background:var(--accent);color:#fff;padding:7px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:background .12s}
.btn-p:hover{background:var(--ahover)}
.btn-g{padding:7px 12px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;color:var(--muted);border:1px solid var(--border);background:var(--surface);transition:all .12s}
.btn-g:hover{color:var(--accent);border-color:var(--accent)}
.btn-danger{color:var(--red);border-color:var(--red);}
.btn-danger:hover{background:var(--rsoft)}

.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-num{font-size:26px;font-weight:700;line-height:1}
.stat-text{font-size:12px;color:var(--muted);margin-top:3px}
.stat-icon{font-size:18px;margin-bottom:8px}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px}
.panel-h{font-size:13.5px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.item-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s}
.item-row:hover{background:var(--bg)}
.item-type{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;flex-shrink:0;white-space:nowrap}
.item-title{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-date{font-size:11px;color:var(--faint);flex-shrink:0}

.type-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;display:inline-block}
.type-book{background:var(--gsoft);color:var(--green)}
.type-video{background:var(--osoft);color:var(--orange)}
.type-concept{background:var(--asoft);color:var(--accent)}
.type-reflection{background:#f0e8ff;color:#7c5ce7}
.type-problem{background:var(--rsoft);color:var(--red)}
.type-plan{background:var(--osoft);color:var(--orange)}
.badge-green{background:var(--gsoft);color:var(--green)}
.badge-orange{background:var(--osoft);color:var(--orange)}
.badge-gray{background:#eef0f4;color:var(--muted)}
.badge-red{background:var(--rsoft);color:var(--red)}
.badge-blue{background:var(--asoft);color:var(--accent)}
.tag{font-size:10.5px;color:var(--accent);background:var(--asoft);padding:2px 7px;border-radius:5px}
.preview-body{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}

.empty{text-align:center;padding:48px 20px;color:var(--faint)}
.empty .big{font-size:36px;margin-bottom:10px}

.modal-mask{position:fixed;inset:0;background:rgba(26,29,46,.4);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border-radius:16px;width:560px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:15px;font-weight:700}
.modal-close{font-size:20px;color:var(--faint);padding:2px 8px;border-radius:6px}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border .12s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:var(--surface)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface)}

.detail{max-width:760px;margin:0 auto}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
.detail-title{font-size:20px;font-weight:700;margin-bottom:12px}
.detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.detail-section{margin-bottom:16px}
.detail-section h4{font-size:11.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.detail-section p,.detail-section .body-text{font-size:13.5px;line-height:1.75;white-space:pre-wrap}
.detail-back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:12.5px;font-weight:500;margin-bottom:14px;cursor:pointer}
.detail-back:hover{color:var(--accent)}
.stars{color:var(--orange);font-size:14px}
.detail-links a{font-size:12.5px;color:var(--accent);text-decoration:none;font-weight:500}
.detail-links a:hover{text-decoration:underline}
.detail-actions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.graph-container{width:100%;height:500px;position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.graph-container canvas{width:100%;height:100%}

/* 文学笔记阅读页 */
.notes-layout{display:flex;gap:16px;height:calc(100vh - 100px)}
.notes-sidebar{width:260px;flex-shrink:0;overflow-y:auto;padding-right:2px}
.notes-reader{flex:1;overflow-y:auto}
.note-group{margin-bottom:14px}
.note-group-h{font-size:11.5px;font-weight:700;color:var(--accent);padding:8px 10px 4px;display:flex;align-items:center;gap:5px}
.note-item{padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;margin-bottom:2px}
.note-item:hover{background:var(--bg)}
.note-item.active{background:var(--asoft)}
.note-item .nt{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.note-item .nd{font-size:10.5px;color:var(--faint);margin-top:1px}
.note-item .concept-badge{font-size:10px;background:var(--asoft);color:var(--accent);padding:1px 6px;border-radius:8px;font-weight:600;flex-shrink:0}
.note-reader-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;box-shadow:var(--shadow);max-width:760px;min-height:400px}
.note-reader-card h1{font-size:21px;font-weight:700;margin-bottom:6px}
.note-reader-card h2{font-size:15px;font-weight:700;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--text)}
.note-reader-card p{font-size:14px;line-height:1.85;margin-bottom:12px}
.note-reader-card blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:var(--asoft);border-radius:0 8px 8px 0;font-size:13.5px;color:var(--muted);line-height:1.7}
.note-reader-card blockquote p{margin-bottom:0}
.note-reader-card hr{border:none;border-top:1px solid var(--border);margin:22px 0}
.note-reader-card ul{margin:8px 0 12px 20px}
.note-reader-card li{font-size:14px;line-height:1.8;margin-bottom:4px}
.note-reader-card .wl{color:var(--accent);font-weight:500}
.detail-card h1{font-size:21px;font-weight:700;margin-bottom:12px}
.detail-card h2{font-size:15px;font-weight:700;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--text)}
.detail-card p{font-size:14px;line-height:1.85;margin-bottom:12px}
.detail-card blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:var(--asoft);border-radius:0 8px 8px 0;font-size:13.5px;color:var(--muted);line-height:1.7}
.detail-card blockquote p{margin-bottom:0}
.detail-card hr{border:none;border-top:1px solid var(--border);margin:22px 0}
.detail-card ul{margin:8px 0 12px 20px}
.detail-card li{font-size:14px;line-height:1.8;margin-bottom:4px}
.note-reader-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.extract-split{display:flex;gap:16px;height:calc(100vh - 150px)}
.extract-split-left{flex:1;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;min-width:0}
.extract-split-right{width:400px;flex-shrink:0;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
.extract-split-right .extract-step{margin-top:14px}
.extract-split-right .extract-step:first-child{margin-top:0}
.extract-split-left h1{font-size:19px;font-weight:700;margin-bottom:10px}
.extract-split-left h2{font-size:15px;font-weight:700;margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.extract-split-left p{font-size:13.5px;line-height:1.8;margin-bottom:10px}
.extract-split-left blockquote{border-left:3px solid var(--accent);padding:6px 14px;margin:10px 0;background:var(--asoft);border-radius:0 6px 6px 0;font-size:13px;color:var(--muted);line-height:1.7}
.extract-split-left blockquote p{margin-bottom:0}
.extract-split-left hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.extract-split-left ul{margin:6px 0 10px 18px}
.extract-split-left li{font-size:13.5px;line-height:1.75;margin-bottom:3px}
.extract-split-left .wl{color:var(--accent);font-weight:500}
.note-editor{width:100%;min-height:420px;padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.7;resize:vertical;outline:none;font-family:inherit}
.note-editor:focus{border-color:var(--accent);background:var(--surface)}
.extract-step{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.extract-hint{font-size:11px;color:var(--faint);margin-top:3px}
.extract-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;outline:none;box-sizing:border-box}
.extract-input:focus{border-color:var(--accent);background:var(--surface)}
.extract-area{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;resize:vertical;outline:none;font-family:inherit;box-sizing:border-box}
.extract-area:focus{border-color:var(--accent);background:var(--surface)}
.distill-summary{font-size:11.5px;color:var(--muted);padding:6px 10px;margin-bottom:10px;background:var(--asoft);border-radius:var(--radius-sm)}

@media(max-width:760px){
  .sidebar{width:52px}.brand-text,.brand-sub,.nav-item span:not(.nav-i),.nav-n,.nav-label{display:none}
  .search{width:160px}.dash-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">🧠</div>
    <div><div class="brand-text">个人知识库</div><div class="brand-sub">My Knowledge OS</div></div>
  </div>
  <nav class="nav" id="nav"></nav>
</aside>
<div class="main">
  <header class="topbar">
    <h1 id="pageTitle">仪表盘</h1>
    <span id="apiStatus" style="font-size:12px;margin-left:8px"></span>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchBox" placeholder="搜索全部内容…">
    </div>
    <button class="btn-p" id="addBtn" onclick="openQuickCapture()" style="display:none">+ 快速记录</button>
  </header>
  <div class="content" id="content"></div>
</div>
</div>
<div class="modal-mask" id="modalMask" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
// API
const API_BASE = (location.host ? '' : 'http://localhost:16000') + '/api';
let apiOnline = true;
async function apiFetch(path, opts={}){
  try{
    const r = await fetch(API_BASE+path, opts);
    if(!r.ok) throw new Error('HTTP '+r.status);
    apiOnline = true;
    updateApiStatus();
    return await r.json();
  }catch(e){
    apiOnline = false;
    updateApiStatus(e.message);
    throw e;
  }
}
async function get(path){ return apiFetch(path) }
async function post(url,data){ return apiFetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}) }
async function put(url,data){ return apiFetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}) }
async function del(url){ return apiFetch(url,{method:'DELETE'}) }
function updateApiStatus(msg){
  const el=document.getElementById('apiStatus');
  if(!el)return;
  if(apiOnline){
    el.textContent='🟢 已连接'; el.style.color='var(--green)';
  }else{
    el.textContent='🔴 未连接服务'+(msg?('：'+msg):'')+' — 请先运行「启动知识库.bat」'; el.style.color='var(--red)';
  }
}

let currentView = 'dashboard';
let dashboardData = null;
let counts = {};
const ESC = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const FMT = ts => {if(!ts)return'';const d=new Date(ts);return isNaN(d.getTime())?ts:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const FMTREL = ts => {if(!ts)return'';const d=Date.now()-(new Date(ts)).getTime();if(d<6e4)return'刚刚';if(d<36e5)return Math.floor(d/6e4)+'分前';if(d<864e5)return Math.floor(d/36e5)+'时前';if(d<6048e5)return Math.floor(d/864e5)+'天前';return FMT(ts)};

const TYPES = [
  {key:'book',label:'书籍',icon:'📚',typeCls:'type-book'},
  {key:'video',label:'视频',icon:'🎬',typeCls:'type-video'},
  {key:'concept',label:'概念',icon:'💡',typeCls:'type-concept'},
  {key:'reflection',label:'反思',icon:'💭',typeCls:'type-reflection'},
  {key:'problem',label:'问题',icon:'❓',typeCls:'type-problem'},
  {key:'plan',label:'计划',icon:'🎯',typeCls:'type-plan'},
];

const TYPE_MAP = Object.fromEntries(TYPES.map(t=>[t.key,t]));
TYPE_MAP['book-notes'] = {key:'book-notes',label:'文学笔记',icon:'📝',typeCls:'type-book'};
TYPE_MAP['video-notes'] = {key:'video-notes',label:'视频笔记',icon:'📺',typeCls:'type-video'};
TYPE_MAP['quicknote'] = {key:'quicknote',label:'闪念笔记',icon:'⚡',typeCls:'type-concept'};

function renderNav(){
  document.getElementById('nav').innerHTML = `
    <div class="nav-label">总览</div>
    <button class="nav-item ${currentView==='dashboard'?'active':''}" onclick="navigate('dashboard')">
      <span class="nav-i">🏠</span><span>仪表盘</span>
    </button>
    <button class="nav-item ${currentView==='search'?'active':''}" onclick="navigate('search')">
      <span class="nav-i">🔍</span><span>搜索</span>
    </button>
    <button class="nav-item ${currentView==='graph'?'active':''}" onclick="navigate('graph')">
      <span class="nav-i">🕸️</span><span>知识图谱</span>
    </button>
    <div class="nav-label">内容</div>
    ${TYPES.map(t=>`<button class="nav-item ${currentView===t.key?'active':''}" onclick="navigate('${t.key}')">
      <span class="nav-i">${t.icon}</span><span>${t.label}</span>
      <span class="nav-n">${counts[t.key]||0}</span>
    </button>`).join('')}
    <button class="nav-item ${currentView==='book-notes'?'active':''}" onclick="navigate('book-notes')">
      <span class="nav-i">📝</span><span>文学笔记</span>
      <span class="nav-n">${counts['book-notes']||0}</span>
    </button>
    <button class="nav-item ${currentView==='video-notes'?'active':''}" onclick="navigate('video-notes')">
      <span class="nav-i">📺</span><span>视频笔记</span>
      <span class="nav-n">${counts['video-notes']||0}</span>
    </button>
  `;
}

async function navigate(view){
  currentView = view;
  renderNav();
  const t = document.getElementById('pageTitle');
  const a = document.getElementById('addBtn');
  if(view === 'dashboard'){ t.textContent = '仪表盘'; a.style.display='none'; renderDashboard(); return }
  if(view === 'search'){ t.textContent = '搜索'; a.style.display='none'; renderSearch(); return }
  if(view === 'graph'){ t.textContent = '知识图谱'; a.style.display='none'; renderGraph(); return }
  if(view === 'book-notes'){ currentNotesView = 'book-notes'; t.textContent = '文学笔记'; a.style.display='none'; renderBookNotes(); return }
  if(view === 'video-notes'){ currentNotesView = 'video-notes'; t.textContent = '视频笔记'; a.style.display='none'; renderVideoNotes(); return }
  const ti = TYPE_MAP[view];
  if(ti){ t.textContent = ti.label; a.style.display='inline-flex'; renderList(view); return }
}

async function loadDashboard(){
  try{ dashboardData = await get('/dashboard'); counts = dashboardData.counts||{}; }
  catch(e){ dashboardData = {counts:{},recent:[],total:0}; counts = {}; }
}

async function renderDashboard(){

// 轻量Markdown渲染（用于卡片预览）：去掉#标题标记、渲染行内格式、截断长度
function renderPreviewMd(text, maxLen){
  if(!text) return '';
  let lines = text.split('\n').filter(l => !/^---+$/.test(l.trim())); // 去掉分割线
  // 去掉第一行的 # 标题（通常是文件标题重复）
  if(/^#+ /.test(lines[0])) lines.shift();
  // 过滤掉空行过多的部分
  let result = lines.join(' ').trim();
  // 渲染行内格式
  result = renderInline(result);
  // 渲染 > 引用为斜体
  result = result.replace(/<p>(.*?)<\/p>/g, '<em>$1</em>');
  // 截断到maxLen字符（在HTML标签之间智能截断比较复杂，这里简单处理）
  const tmp = document.createElement('div');
  tmp.innerHTML = result;
  const plain = tmp.textContent || tmp.innerText || '';
  if(plain.length > maxLen){
    result = plain.slice(0, maxLen) + '…';
  } else {
    result = tmp.innerHTML;
  }
  return result;
}

function statusColor(s){
  if(/已|解决|完成|读|看/.test(s))return'badge-green';
  if(/待/.test(s))return'badge-gray';
  if(/中/.test(s))return'badge-orange';
  return'badge-blue';
}

async function openDetail(filepath){
  const it = await get(`/item?path=${encodeURIComponent(decodeURIComponent(filepath))}`);
  if(it.error) return alert('文件未找到');
  const t = TYPE_MAP[it.type];
  let html = `<div class="detail"><span class="detail-back" onclick="navigate('${it.type}')">← 返回${t?.label||''}</span>`;
  html += `<div class="detail-card">`;
  html += `<div class="detail-title">${ESC(it.title)}</div>`;
  html += `<div class="detail-meta">`;
  if(t) html += `<span class="type-badge ${t.typeCls}">${t.icon} ${t.label}</span>`;
  if(it.status) html += `<span class="type-badge ${statusColor(it.status)}">${it.status}</span>`;
  if(it.priority) html += `<span class="type-badge badge-gray">${it.priority}</span>`;
  if(it.mood) html += `<span class="type-badge badge-blue">${it.mood}</span>`;
  if(it.rating>0) html += `<span class="stars">${'★'.repeat(it.rating)}${'☆'.repeat(5-it.rating)}</span>`;
  html += `</div>`;
  if(it.author) html += `<div class="detail-section"><h4>作者</h4><p>${ESC(it.author)}</p></div>`;
  if(it.source) html += `<div class="detail-section"><h4>来源</h4><p>${ESC(it.source)}</p></div>`;
  if(it.url) html += `<div class="detail-section"><h4>链接</h4><p><a href="${ESC(it.url)}" target="_blank">${ESC(it.url)}</a></p></div>`;
  if(it.domain) html += `<div class="detail-section"><h4>领域</h4><p>${ESC(it.domain)}</p></div>`;
  if(it.content) html += `<div class="detail-section"><h4>内容</h4>${renderNoteContent(it.content)}</div>`;
  if(it.tags&&it.tags.length) html += `<div class="detail-section"><h4>标签</h4>${it.tags.map(t=>`<span class="tag">${ESC(t)}</span>`).join(' ')}</div>`;
  // 概念页：显示来源笔记
  if(it.type==='concept'){
    html += `<div class="detail-section"><h4>📖 来源笔记</h4><div class="detail-links" id="conceptSources">加载中…</div></div>`;
  }
  // 书籍枢纽页：显示同文件夹下的文学笔记
  if(it.type==='book'){
    const allBooks = await get(`/items?type=book`);
    const notes = allBooks.filter(b => b.type==='book-notes' && b.path.startsWith(it.path.replace(/[^/]+\.md$/,'')));
    if(notes.length){
      html += `<div class="detail-section"><h4>📝 文学笔记</h4><div class="detail-links">${notes.map(n=>`<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(n.path)}')">📄 ${ESC(n.title)}</a>`).join(' · ')}</div></div>`;
    }
  }
  // 视频枢纽页：显示同文件夹下的视频笔记
  if(it.type==='video'){
    const allVideos = await get(`/items?type=video`);
    const notes = allVideos.filter(v => v.type==='video-notes' && v.path.startsWith(it.path.replace(/[^/]+\.md$/,'')));
    if(notes.length){
      html += `<div class="detail-section"><h4>📺 视频笔记</h4><div class="detail-links">${notes.map(n=>`<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(n.path)}')">📄 ${ESC(n.title)}</a>`).join(' · ')}</div></div>`;
    }
  }
  html += `<div class="detail-section"><h4>链接</h4><div class="detail-links">${(it.links||[]).map(l=>`<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(l)}.md')">[[${ESC(l)}]]</a>`).join(' · ')||'无'}</div></div>`;
  if(it.backlinks&&it.backlinks.length) html += `<div class="detail-section"><h4>被以下引用</h4><div class="detail-links">${it.backlinks.map(bl=>`<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(bl.path)}')">← ${ESC(bl.title)} (${TYPE_MAP[bl.type]?.label||bl.type})</a>`).join(' · ')}</div></div>`;
  html += `<div class="detail-meta" style="font-size:11px;color:var(--faint)">创建于 ${FMT(it.created)} · 更新于 ${FMT(it.updated)} · 文件: ${it.path}</div>`;
  html += `<div class="detail-actions"><button class="btn-p" onclick="openEdit('${encodeURIComponent(it.path)}')">✏️ 编辑</button><button class="btn-g btn-danger" onclick="deleteItem('${encodeURIComponent(it.path)}')">🗑 删除</button></div>`;
  html += `</div></div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('pageTitle').textContent = (t?.label||'')+' › 详情';
  document.getElementById('addBtn').style.display = 'none';
  // 异步加载概念的来源笔记
  if(it.type==='concept'){
    loadSourcesForConcept(it.title);
  }
}

// 查找哪些笔记引用了这个概念
async function loadSourcesForConcept(conceptName){
  const el = document.getElementById('conceptSources');
  if(!el) return;
  try{
    const [bookNotes, videoNotes] = await Promise.all([
      get('/items?type=book-notes').catch(()=>[]),
      get('/items?type=video-notes').catch(()=>[])
    ]);
    const allNotes = [...(Array.isArray(bookNotes)?bookNotes:[]), ...(Array.isArray(videoNotes)?videoNotes:[])];
    const sources = allNotes.filter(n => (n.concepts||[]).includes(conceptName));
    if(!sources.length){
      el.innerHTML = '<span style="color:var(--faint)">暂无关联笔记</span>';
      return;
    }
    const iconMap = {'book-notes':'📝','video-notes':'📺'};
    el.innerHTML = sources.map(n => {
      const parent = n.path.split('/').slice(-2,-1)[0] || '未知';
      return `<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(n.path)}')" style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;margin-bottom:4px">${iconMap[n.type]||'📄'} ${ESC(parent)} — ${ESC(n.title.replace(/-文学笔记|-视频笔记/g,''))}</a>`;
    }).join('');
  }catch(e){
    el.innerHTML = '<span style="color:var(--faint)">加载失败</span>';
  }
}

function makeOptions(opts, type, current){
  let mo = opts[type] || [''];
  if(!mo.length) return `<option>${current||''}</option>`;
  return mo.map(o=>`<option ${o===current?'selected':''}>${o}</option>`).join('');
}

async function saveEdit(filepath){
  const fp = decodeURIComponent(filepath);

  ['status','rating','priority','mood'].forEach(k=>{

    if(el){ data[k] = k==='rating' ? parseInt(el.value) : el.value; }

  if(contentEl) data.content = contentEl.value;
  await put('/item', {path: fp, ...data});

  await loadDashboard();
  openDetail(filepath);
}

function drawGraph(data){
  const box = document.getElementById('graphBox');
  const W = box.clientWidth, H = box.clientHeight;
  const colors = {book:'var(--green)','book-notes':'#5b8c5a',video:'var(--orange)','video-notes':'#c87f3e',concept:'var(--accent)',reflection:'#7c5ce7',problem:'var(--red)',plan:'var(--orange)'};
  const nodes = data.nodes||[], edges = data.edges||[];
  // 仅显示有关联的节点
  const linkedIds = new Set();
  edges.forEach(e=>{linkedIds.add(e.source);linkedIds.add(e.target)});
  const displayNodes = nodes.filter(n=>linkedIds.has(n.id));
  if(!displayNodes.length){ box.innerHTML = '<div class="empty"><div class="big">🕸️</div>暂无链接数据<br><span style="font-size:12px">在 .md 文件中使用 [[wikilinks]] 建立关联</span></div>'; return }

  // 简单的力导向布局
  const nodeMap = {};
  displayNodes.forEach((n,i)=>{
    const angle = (i/displayNodes.length)*Math.PI*2;
    const r = Math.min(W,H)*0.32;
    nodeMap[n.id] = {x:W/2+Math.cos(angle)*r, y:H/2+Math.sin(angle)*r, ...n};
  });
  // 简单迭代
  for(let iter=0;iter<20;iter++){
    const forces = {};
    displayNodes.forEach(n=>forces[n.id]={fx:0,fy:0});
    edges.forEach(e=>{
      const s=nodeMap[e.source],t=nodeMap[e.target];
      if(!s||!t)return;
      const dx=t.x-s.x,dy=t.y-s.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      const f=0.04*(dist-150);
      forces[e.source].fx+=dx/dist*f; forces[e.source].fy+=dy/dist*f;
      forces[e.target].fx-=dx/dist*f; forces[e.target].fy-=dy/dist*f;
    });
    displayNodes.forEach(n=>{
      const f=forces[n.id];
      nodeMap[n.id].x+=f.fx*0.8; nodeMap[n.id].y+=f.fy*0.8;
      nodeMap[n.id].x=Math.max(60,Math.min(W-60,nodeMap[n.id].x));
      nodeMap[n.id].y=Math.max(40,Math.min(H-40,nodeMap[n.id].y));
    });
  }

  const svg = `<svg width="${W}" height="${H}" style="position:absolute;top:0;left:0">
    <rect width="${W}" height="${H}" fill="transparent"/>
    ${edges.map(e=>{
      const s=nodeMap[e.source],t=nodeMap[e.target];
      if(!s||!t)return'';
      return`<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#dde0ed" stroke-width="1.2"/>`;
    }).join('')}
    ${Object.values(nodeMap).map(n=>`<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(n.path)}')">
      <circle cx="${n.x}" cy="${n.y}" r="${Math.max(1,Math.min(12,4+n.id.length*0.5)+5)}" fill="${colors[n.type]||'#999'}" opacity=".85" stroke="white" stroke-width="2"/>
    </a>`).join('')}
    ${Object.values(nodeMap).map(n=>`<text x="${n.x}" y="${n.y+22}" text-anchor="middle" font-size="11" fill="#333" font-family="system-ui" style="pointer-events:none">${ESC(n.label.slice(0,8))}</text>`).join('')}
  </svg>`;
  box.innerHTML = svg;
}

function renderNoteContent(text){
  if(!text || !text.trim()) return '<p style="color:var(--faint)">暂无内容，点击「编辑」开始记录</p>';
  const lines = text.split('\n');
  let html = '';
  let inList = false, inQuote = false;

  for(let line of lines){
    const t = line.trim();
    if(/^# [^#]/.test(t)){
      if(inList){html+='</ul>';inList=false}
      if(inQuote){html+='</blockquote>';inQuote=false}
      html += `<h1>${renderInline(t.slice(2))}</h1>`;
    } else if(/^## /.test(t)){
      if(inList){html+='</ul>';inList=false}
      if(inQuote){html+='</blockquote>';inQuote=false}
      html += `<h2>${renderInline(t.slice(3))}</h2>`;
    } else if(/^---+$/.test(t)){
      if(inList){html+='</ul>';inList=false}
      if(inQuote){html+='</blockquote>';inQuote=false}
      html += '<hr>';
    } else if(/^> /.test(t)){
      if(inList){html+='</ul>';inList=false}
      if(!inQuote){html+='<blockquote>';inQuote=true}
      html += '<p>' + renderInline(t.slice(2)) + '</p>';
    } else if(/^[-*] /.test(t)){
      if(inQuote){html+='</blockquote>';inQuote=false}
      if(!inList){html+='<ul>';inList=true}
      html += `<li>${renderInline(t.slice(2))}</li>`;
    } else if(t === ''){
      if(inList){html+='</ul>';inList=false}
      if(inQuote){html+='</blockquote>';inQuote=false}
    } else {
      if(inList){html+='</ul>';inList=false}
      if(inQuote){html+='</blockquote>';inQuote=false}
      html += `<p>${renderInline(t)}</p>`;
    }
  }
  if(inList) html+='</ul>';
  if(inQuote) html+='</blockquote>';
  return html;
}

function renderInline(text){
  let html = ESC(text);
  html = html.replace(/\[\[([^\]|#]+)(?:[|#][^\]]+)?\]\]/g, (m, l) => {
    const name = l.split('/').pop().trim();
    return `<a href="#" onclick="event.preventDefault();openDetail('${encodeURIComponent(name)}.md')" style="color:var(--accent);font-weight:500;text-decoration:none">${ESC(name)}</a>`;
  });
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[([^\]]*)\]\(([^)]*)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline">$1</a>');
  return html;
}

      <span class="type-badge ${isVideo ? 'type-video' : 'type-book'}">${icon} ${ESC(parentName)}</span>
      <span style="font-size:13px;font-weight:600;color:var(--muted)">💡 从笔记提取概念</span>
      <button class="btn-g" style="margin-left:auto" onclick="loadNoteContent('${encodeURIComponent(fp)}')">← 返回笔记</button>
    </div>
    <div class="extract-split">
      <div class="extract-split-left">
        <h1>${ESC(it.title)}</h1>
        ${renderNoteContent(it.content)}
      </div>
      <div class="extract-split-right">
        <div style="margin-bottom:14px;padding:8px 12px;background:var(--asoft);border-radius:var(--radius-sm);font-size:11.5px;color:var(--muted)">
          📚 来源：<strong style="color:var(--accent)">${ESC(parentName)}</strong>
        </div>

        <div class="extract-step">① 原文摘录</div>
        <textarea class="extract-area" id="xc_excerpt" style="min-height:70px;margin-bottom:3px" placeholder="← 从左侧笔记中选中文字复制过来"></textarea>
        <div class="extract-hint" style="margin-bottom:12px">从左边笔记复制一段有价值的段落</div>

        <div class="extract-step">② 概念名称</div>
        <input class="extract-input" id="xc_name" type="text" style="margin-bottom:3px" placeholder="例：智力的可塑性">
        <div class="extract-hint" style="margin-bottom:12px">用一个名词短语概括</div>

        <div class="extract-step">③ 一句话定义</div>
        <input class="extract-input" id="xc_definition" type="text" style="margin-bottom:3px" placeholder="例：智力不是固定的，可以通过训练改变">
        <div class="extract-hint" style="margin-bottom:12px">不超过20字，像字典词条</div>

        <div class="extract-step">④ 核心解释</div>
        <textarea class="extract-area" id="xc_content" style="min-height:80px;margin-bottom:3px" placeholder="用自己的话展开说明"></textarea>
        <div class="extract-hint" style="margin-bottom:12px">基于摘录改写，不要直接复制</div>

        <div class="extract-step">⑤ 怎么用 <span style="color:var(--faint);font-weight:400">（可选）</span></div>
        <textarea class="extract-area" id="xc_howto" style="min-height:50px;margin-bottom:3px" placeholder="什么场景下能帮到你？"></textarea>
        <div class="extract-hint" style="margin-bottom:12px">想象一个具体场景</div>

        <div class="extract-step">标签 <span style="color:var(--faint);font-weight:400">（可选）</span></div>
        <input class="extract-input" id="xc_tags" type="text" placeholder="逗号分隔，例：心理学, 认知">

        <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
          <button class="btn-g" onclick="loadNoteContent('${encodeURIComponent(fp)}')">取消</button>
          <button class="btn-p" onclick="saveExtractedConcept('${ESC(parentName)}','${encodeURIComponent(fp)}')">💡 创建概念</button>
        </div>
      </div>
    </div>`;
}

async function saveExtractedConcept(bookName, notePath){
  const name = document.getElementById('xc_name').value.trim();
  if(!name){ alert('请填写概念名称'); return; }

  const excerpt = document.getElementById('xc_excerpt').value.trim();
  const definition = document.getElementById('xc_definition').value.trim();
  const content = document.getElementById('xc_content').value.trim();
  const howto = document.getElementById('xc_howto').value.trim();
  const tagsRaw = document.getElementById('xc_tags').value.trim();
  const tags = tagsRaw.split(/[,，、]/).map(s=>s.trim()).filter(Boolean);

  const conceptData = {
    type: 'concept',
    title: name,
    definition: definition || '一句话定义',
    content: content || '',
    excerpt: excerpt || '',
    how_to_use: howto || '',
    source: bookName,
    tags: tags
  };

  try{
    // 1. 创建概念卡片
    await post('/item', conceptData);

    // 2. 回写笔记的 concepts 字段
    const fp = decodeURIComponent(notePath);
    let note;
    try{ note = await get('/item?path=' + encodeURIComponent(fp)); }catch(e){ note = null; }
    if(note){
      const concepts = note.concepts || [];
      if(!concepts.includes(name)){
        concepts.push(name);
        await put('/item', {path: fp, concepts: concepts});
      }
    }

    await loadDashboard();
    if(currentNotesView === 'video-notes'){
      await renderVideoNotes();
    } else {
      await renderBookNotes();
    }
    if(notePath) loadNoteContent(notePath);
  }catch(e){
    alert('创建失败：' + e.message);
  }
}

// 侧边栏搜索
document.getElementById('searchBox').addEventListener('input', function(){
  if(currentView==='search') renderSearch();
});

// 启动
(async function init(){
  try{
    await loadDashboard();
    renderNav();
    renderDashboard();
  }catch(e){
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="big">🔴</div>无法连接服务<p style="margin-top:10px;color:var(--faint)">请先双击运行「启动知识库.bat」</p></div>';
  }
  updateApiStatus();
})();
</script>
